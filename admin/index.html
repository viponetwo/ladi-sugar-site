<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladi Sugar | Панель управления</title>
    <style>
        :root { --bg: #f8fafc; --sidebar: #1e293b; --primary: #3b82f6; --card: #fff; --border: #e2e8f0; --text: #0f172a; --error: #ef4444; --success: #22c55e; --danger: #dc2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; }
        
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(5px); }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .login-box h2 { margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
        .login-box button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .error-msg { color: var(--error); font-size: 13px; margin-top: 10px; display: none; }

        #admin-ui { display: none; width: 100%; flex-direction: row; }
        .sidebar { width: 240px; background: var(--sidebar); color: white; display: flex; flex-direction: column; padding: 20px 0; }
        .nav-item { padding: 12px 20px; cursor: pointer; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #334155; border-right: 3px solid var(--primary); }
        .main { flex: 1; overflow-y: auto; padding: 30px; }
        .section { display: none; max-width: 800px; }
        .section.active { display: block; }
        
        .form-group { margin-bottom: 15px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .form-group label { display: block; font-weight: 500; margin-bottom: 6px; color: #475569; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .dynamic-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        .list-card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); position: relative; }
        .list-card .delete-btn { position: absolute; top: 10px; right: 10px; background: #fee2e2; color: var(--danger); border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 13px; }
        .list-card .delete-btn:hover { background: #fecaca; }
        .list-card .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .list-card .field-row.full { grid-template-columns: 1fr; }
        
        .add-btn { width: 100%; padding: 12px; background: #f1f5f9; border: 2px dashed var(--border); border-radius: 8px; cursor: pointer; color: #64748b; font-weight: 500; transition: 0.2s; }
        .add-btn:hover { background: #e2e8f0; color: var(--text); border-color: #cbd5e1; }

        .btn-save { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 12px rgba(59,130,246,0.3); z-index: 100; }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; background: var(--success); color: white; border-radius: 8px; opacity: 0; transition: 0.3s; transform: translateY(-20px); }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: var(--error); }
        small { color: #64748b; display: block; margin-top: 5px; font-size: 12px; }

        @media (max-width: 768px) { 
            #admin-ui { flex-direction: column; } 
            .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; } 
            .list-card .field-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2>🔒 Вход в админку</h2>
            <input type="password" id="pass-input" placeholder="Введите пароль" onkeydown="if(event.key==='Enter') login()">
            <button onclick="login()">Войти</button>
            <div id="error-msg" class="error-msg">Неверный пароль</div>
        </div>
    </div>

    <div id="admin-ui">
        <aside class="sidebar">
            <div style="padding: 0 20px 20px; font-weight: bold; border-bottom: 1px solid #334155;">🔧 Ladi Sugar Admin</div>
            <div class="nav-item active" onclick="show('hero')">🏠 Главный экран</div>
            <div class="nav-item" onclick="show('master')">👤 О мастере</div>
            <div class="nav-item" onclick="show('prices')">💰 Прайс</div>
            <div class="nav-item" onclick="show('reviews')">💬 Отзывы</div>
            <div class="nav-item" onclick="show('moderation')">🕒 Модерация</div>
            <div class="nav-item" onclick="show('blog')">📝 Блог</div>
            <div class="nav-item" onclick="show('contacts')">📞 Контакты</div>
        </aside>
        <main class="main">
            <section id="hero" class="section active">
                <div class="form-group"><label>Заголовок H1</label><input data-bind="hero.title"></div>
                <div class="form-group"><label>Подзаголовок</label><textarea rows="3" data-bind="hero.subtitle"></textarea></div>
                <div class="form-group"><label>Текст кнопки</label><input data-bind="hero.btnText"></div>
                <div class="form-group"><label>Ссылка Dikidi</label><input type="url" data-bind="hero.dikidiUrl"></div>
            </section>
            <section id="master" class="section">
                <div class="form-group"><label>Имя</label><input data-bind="master.name"></div>
                <div class="form-group"><label>Описание</label><textarea rows="5" data-bind="master.description"></textarea></div>
            </section>
            <section id="prices" class="section">
                <div class="dynamic-list" id="prices-list"></div>
                <button class="add-btn" onclick="addItem('prices')">+ Добавить услугу</button>
            </section>
            <section id="reviews" class="section">
                <div class="dynamic-list" id="reviews-list"></div>
                <button class="add-btn" onclick="addItem('reviews')">+ Добавить отзыв вручную</button>
            </section>
            <section id="moderation" class="section">
                <div class="section-header"><h2>🕒 Отзывы на проверке</h2></div>
                <div id="pending-list" class="dynamic-list"></div>
                <p id="no-pending" style="color:#64748b; text-align:center; padding:20px;">Новых отзывов нет ✅</p>
            </section>
            <section id="blog" class="section">
                <div class="dynamic-list" id="blog-list"></div>
                <button class="add-btn" onclick="addItem('blog')">+ Добавить статью</button>
            </section>
            <section id="contacts" class="section">
                <div class="form-group"><label>Адрес</label><input data-bind="contacts.address"></div>
                <div class="form-group"><label>Телефон</label><input data-bind="contacts.phone"></div>
                <div class="form-group"><label>WhatsApp (цифры без +)</label><input data-bind="contacts.whatsapp"></div>
            </section>
        </main>
        <button class="btn-save" id="saveBtn" onclick="saveData()">💾 Сохранить и Опубликовать</button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let currentData = {};
        let sessionToken = '';

        const LIST_CONFIG = {
            prices: [ { name: 'name', label: 'Название услуги', type: 'text' }, { name: 'value', label: 'Цена (BYN)', type: 'text' } ],
            reviews: [ { name: 'name', label: 'Имя клиента', type: 'text' }, { name: 'text', label: 'Текст отзыва', type: 'textarea' }, { name: 'rating', label: 'Рейтинг (1-5)', type: 'number', min: 1, max: 5 } ],
            blog: [ { name: 'title', label: 'Заголовок статьи', type: 'text' }, { name: 'date', label: 'Дата', type: 'text' }, { name: 'excerpt', label: 'Краткое описание', type: 'textarea' }, { name: 'content', label: 'Полный текст', type: 'textarea' }, { name: 'image', label: 'Ссылка на обложку', type: 'text' } ]
        };

        const DEFAULTS = {
            prices: { name: 'Новая услуга', value: '0' },
            reviews: { name: 'Имя', text: 'Отличный мастер!', rating: 5 },
            blog: { title: 'Новая статья', date: new Date().toISOString().split('T')[0], excerpt: 'Кратко...', content: 'Текст...', image: '' }
        };

        function getNested(obj, path) { return path.split('.').reduce((acc, part) => acc && acc[part], obj); }
        function setNested(obj, path, value) {
            const keys = path.split('.');
            let current = obj;
            for (let i = 0; i < keys.length - 1; i++) current = current[keys[i]];
            current[keys[keys.length - 1]] = value;
        }

        async function login() {
            const pass = document.getElementById('pass-input').value;
            const btn = document.querySelector('.login-box button');
            const err = document.getElementById('error-msg');
            btn.textContent = 'Проверка...'; btn.disabled = true; err.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pass }) });
                const data = await res.json();
                if (data.success) {
                    sessionToken = data.token;
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('admin-ui').style.display = 'flex';
                    loadData();
                } else { err.style.display = 'block'; }
            } catch (e) { err.textContent = 'Ошибка соединения'; err.style.display = 'block'; }
            finally { btn.textContent = 'Войти'; btn.disabled = false; }
        }

        async function loadData() {
            try {
                const res = await fetch('/data.json');
                currentData = await res.json();
                
                document.querySelectorAll('[data-bind]').forEach(el => {
                    const path = el.dataset.bind;
                    el.value = getNested(currentData, path) || '';
                    el.addEventListener('input', e => setNested(currentData, path, e.target.value));
                });

                renderList('prices');
                renderList('reviews');
                renderPending();
                renderList('blog');

                showToast('✅ Данные загружены');
            } catch (e) { showToast('❌ Ошибка загрузки data.json', true); }
        }

        function renderList(type) {
            const container = document.getElementById(`${type}-list`);
            container.innerHTML = '';
            const fields = LIST_CONFIG[type];
            (currentData[type] || []).forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'list-card';
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn'; delBtn.innerHTML = '🗑 Удалить';
                delBtn.onclick = () => removeItem(type, index);
                card.appendChild(delBtn);

                fields.forEach(f => {
                    const wrap = document.createElement('div');
                    wrap.className = `field-row ${f.type === 'textarea' ? 'full' : ''}`;
                    const label = document.createElement('label'); label.textContent = f.label;
                    let input = f.type === 'textarea' ? document.createElement('textarea') : document.createElement('input');
                    if (f.type === 'textarea') input.rows = 3;
                    else { input.type = f.type; if (f.min !== undefined) input.min = f.min; if (f.max !== undefined) input.max = f.max; }
                    input.value = item[f.name] || '';
                    input.oninput = (e) => { currentData[type][index][f.name] = e.target.value; };
                    wrap.appendChild(label); wrap.appendChild(input); card.appendChild(wrap);
                });
                container.appendChild(card);
            });
        }

        function renderPending() {
            const container = document.getElementById('pending-list');
            const noMsg = document.getElementById('no-pending');
            container.innerHTML = '';
            const pending = (currentData.reviews || []).filter(r => r.status === 'pending');
            noMsg.style.display = pending.length ? 'none' : 'block';

            pending.forEach((item) => {
                const realIdx = currentData.reviews.indexOf(item);
                const card = document.createElement('div');
                card.className = 'list-card';
                card.innerHTML = `
                    <div class="field-row full">
                        <label><b>${item.name}</b> (${item.rating}⭐) — ${item.date}</label>
                        <p style="margin:8px 0; background:#f1f5f9; padding:10px; border-radius:6px; white-space: pre-wrap;">${item.text}</p>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="delete-btn" style="position:static; background:#dcfce7; color:#166534;" onclick="moderateReview(${realIdx}, 'approved')">✅ Принять</button>
                        <button class="delete-btn" style="position:static; background:#fee2e2; color:#991b1b;" onclick="moderateReview(${realIdx}, 'rejected')">❌ Удалить</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function moderateReview(index, status) {
            if (status === 'approved') delete currentData.reviews[index].status;
            else currentData.reviews.splice(index, 1);
            renderPending(); renderList('reviews'); saveData();
        }

        function addItem(type) {
            if (!Array.isArray(currentData[type])) currentData[type] = [];
            currentData[type].push({ ...DEFAULTS[type] });
            renderList(type);
        }

        function removeItem(type, index) {
            if (confirm('Удалить этот элемент?')) {
                currentData[type].splice(index, 1);
                renderList(type);
            }
        }

        async function saveData() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = '⏳ Сохранение...';

            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
                    body: JSON.stringify({ content: currentData, token: sessionToken })
                });
                const result = await res.json();
                if (res.ok) showToast('✅ Успешно! Сайт обновится через ~60 сек.');
                else showToast('❌ ' + (result.message || result.details), true);
            } catch (e) { showToast('❌ Ошибка сети', true); }
            finally { btn.disabled = false; btn.textContent = '💾 Сохранить и Опубликовать'; }
        }

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `toast ${isError ? 'error' : ''} show`;
            setTimeout(() => t.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
